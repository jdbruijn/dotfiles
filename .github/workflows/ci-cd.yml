name: CI/CD
on:
  push:
    branches:
      - main
      - beta
      - renovate/**
  pull_request: null
jobs:
  lint:
    uses: vidavidorra/.github/.github/workflows/node-lint.yml@2de0b64ac3f62bc2da0bcdc8e5d0fffa2b6437ff # v5.0.72
  release:
    uses: vidavidorra/.github/.github/workflows/release.yml@2de0b64ac3f62bc2da0bcdc8e5d0fffa2b6437ff # v5.0.72
    needs:
      - lint
    secrets:
      privateKey: ${{ secrets.RELEASE_PRIVATE_KEY }}
