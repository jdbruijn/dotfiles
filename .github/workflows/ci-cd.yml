name: CI/CD
on:
  push:
    branches:
      - main
      - beta
      - renovate/**
  pull_request: null
jobs:
  lint:
    uses: vidavidorra/.github/.github/workflows/node-lint.yml@0b0ffa183299cae645f66692ed446f051257fa02 # v8.1.7
  release:
    uses: vidavidorra/.github/.github/workflows/release.yml@0b0ffa183299cae645f66692ed446f051257fa02 # v8.1.7
    needs:
      - lint
    secrets:
      privateKey: ${{ secrets.RELEASE_PRIVATE_KEY }}
