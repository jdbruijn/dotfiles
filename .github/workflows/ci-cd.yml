name: CI/CD
on:
  push:
    branches:
      - main
      - beta
      - renovate/**
  pull_request: null
jobs:
  lint:
    uses: vidavidorra/.github/.github/workflows/node-lint.yml@860270074a02c0fdab23000ba8c183f68f4bc9ca # v8.1.4
  release:
    uses: vidavidorra/.github/.github/workflows/release.yml@860270074a02c0fdab23000ba8c183f68f4bc9ca # v8.1.4
    needs:
      - lint
    secrets:
      privateKey: ${{ secrets.RELEASE_PRIVATE_KEY }}
