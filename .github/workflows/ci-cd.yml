name: CI/CD
on:
  push:
    branches:
      - main
      - beta
      - renovate/**
  pull_request: null
jobs:
  lint:
    uses: vidavidorra/.github/.github/workflows/node-lint.yml@2696169c95d78e29fa8ee1776d805321ad7f632d # v8.1.8
  release:
    uses: vidavidorra/.github/.github/workflows/release.yml@2696169c95d78e29fa8ee1776d805321ad7f632d # v8.1.8
    needs:
      - lint
    secrets:
      privateKey: ${{ secrets.RELEASE_PRIVATE_KEY }}
