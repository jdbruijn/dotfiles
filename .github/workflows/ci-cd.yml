name: CI/CD
on:
  push:
    branches:
      - main
      - beta
      - renovate/**
  pull_request: null
jobs:
  lint:
    uses: vidavidorra/.github/.github/workflows/node-lint.yml@7957bd96aca8ba12377392ea3c557c235d6fe929 # v8.1.6
  release:
    uses: vidavidorra/.github/.github/workflows/release.yml@7957bd96aca8ba12377392ea3c557c235d6fe929 # v8.1.6
    needs:
      - lint
    secrets:
      privateKey: ${{ secrets.RELEASE_PRIVATE_KEY }}
