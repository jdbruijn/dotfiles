name: CI/CD
on:
  push:
    branches:
      - main
      - beta
      - renovate/**
  pull_request: null
jobs:
  lint:
    uses: vidavidorra/.github/.github/workflows/node-lint.yml@f79909a3e21f4337fcf0756c9d105584e3aa59c0 # v8.1.18
  release:
    uses: vidavidorra/.github/.github/workflows/release.yml@f79909a3e21f4337fcf0756c9d105584e3aa59c0 # v8.1.18
    needs:
      - lint
    secrets:
      privateKey: ${{ secrets.RELEASE_PRIVATE_KEY }}
